<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant TTS Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-3xl p-8 rounded-3xl shadow-2xl glass border border-white">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Vocalise <span class="text-blue-600">Pro</span></h1>
            <p class="text-gray-500 mt-2">Kostenlose, unbegrenzte Text-to-Speech Lösung</p>
        </header>

        <textarea id="textInput" rows="10" 
            class="w-full p-6 text-lg text-gray-700 bg-white border-none rounded-2xl shadow-inner focus:ring-2 focus:ring-blue-500 outline-none resize-none mb-6"
            placeholder="Füge hier deinen Text ein..."></textarea>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">Stimme auswählen</label>
                <select id="voiceSelect" class="w-full p-3 bg-white rounded-xl shadow-sm border border-gray-200 focus:outline-none"></select>
            </div>
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Tempo</label>
                    <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Tonhöhe</label>
                    <input type="range" id="pitch" min="0" max="2" value="1" step="0.1" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
            </div>
        </div>

        <div class="flex flex-wrap gap-4 justify-center">
            <button id="speakBtn" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-full transition-all shadow-lg flex items-center gap-2">
                <span>Wiedergabe</span>
            </button>
            <button id="pauseBtn" class="px-8 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-full transition-all">
                Pause
            </button>
            <button id="stopBtn" class="px-8 py-3 bg-red-100 hover:bg-red-200 text-red-600 font-semibold rounded-full transition-all">
                Stopp
            </button>
            <button id="downloadBtn" class="px-8 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-full transition-all shadow-lg hidden">
                Download MP3
            </button>
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const textInput = document.querySelector('#textInput');
        const voiceSelect = document.querySelector('#voiceSelect');
        const speakBtn = document.querySelector('#speakBtn');
        const pauseBtn = document.querySelector('#pauseBtn');
        const stopBtn = document.querySelector('#stopBtn');
        const rateInput = document.querySelector('#rate');
        const pitchInput = document.querySelector('#pitch');
        const downloadBtn = document.querySelector('#downloadBtn');

        let voices = [];
        let isSpeaking = false;

        function populateVoiceList() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = '';
            
            // Bevorzuge deutsche und "Natural" Stimmen
            voices.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                if (voice.default) option.textContent += ' -- DEFAULT';
                
                option.setAttribute('data-lang', voice.lang);
                option.setAttribute('data-name', voice.name);
                voiceSelect.appendChild(option);
            });
        }

        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function speak() {
            if (synth.speaking) {
                synth.resume();
                return;
            }

            if (textInput.value !== '') {
                const utterThis = new SpeechSynthesisUtterance(textInput.value);
                
                const selectedOption = voiceSelect.selectedOptions[0].getAttribute('data-name');
                voices.forEach((voice) => {
                    if (voice.name === selectedOption) {
                        utterThis.voice = voice;
                    }
                });

                utterThis.rate = rateInput.value;
                utterThis.pitch = pitchInput.value;

                utterThis.onend = () => {
                    console.log('Sprachausgabe beendet');
                    isSpeaking = false;
                };

                synth.speak(utterThis);
            }
        }

        speakBtn.onclick = () => {
            speak();
        };

        pauseBtn.onclick = () => {
            if (synth.speaking) synth.pause();
        };

        stopBtn.onclick = () => {
            synth.cancel();
        };

        /* Hinweis zum Download: 
           Da die Web Speech API den Sound direkt ausgibt, 
           wird in der Praxis oft ein Tool wie "Record Tab" genutzt. 
           Für eine echte Web-Lösung ohne Server müssten wir den AudioContext routen, 
           was Browser-Sicherheits-Einschränkungen hat. 
        */
        
        // Kleine Animation bei Klick
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 100);
            });
        });
    </script>
</body>
</html>
