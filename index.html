<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Studio | DL - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; }
        .studio-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #334155; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; margin-top: -6px; cursor: pointer; }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-5xl studio-card rounded-[2.5rem] p-6 md:p-12 shadow-2xl">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                    Voice Studio <span class="text-white opacity-20">|</span> DL
                </h1>
                <p class="text-slate-400 text-sm mt-1 font-medium">Realistische Stimmen & MP3 Export</p>
            </div>
            <div id="status" class="px-4 py-2 rounded-full bg-slate-800 border border-slate-700 text-xs font-mono flex items-center gap-2">
                <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                <span id="statusText">BEREIT</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <div class="p-6 bg-slate-800/50 rounded-3xl border border-white/5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4">Stimmen-Profil</label>
                    <select id="voiceSelect" class="w-full bg-slate-900 text-white p-3 rounded-xl border border-slate-700 outline-none focus:ring-2 focus:ring-blue-500 mb-4 text-sm"></select>
                    
                    <div class="space-y-4">
                        <div class="flex justify-between text-[10px] font-bold">
                            <span class="text-slate-400 uppercase">Geschwindigkeit</span>
                            <span id="speedVal" class="text-blue-400">1.0x</span>
                        </div>
                        <input type="range" id="speedInput" min="0.5" max="2" value="1" step="0.1" class="w-full">
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button id="playBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl transition-all flex items-center justify-center gap-3 shadow-lg shadow-blue-900/20 active:scale-95">
                        <i class="fas fa-play"></i> Vorschau
                    </button>
                    <button id="downloadBtn" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-2xl transition-all flex items-center justify-center gap-3 shadow-lg shadow-emerald-900/20 active:scale-95">
                        <i class="fas fa-file-download"></i> MP3 Herunterladen
                    </button>
                    <button id="stopBtn" class="w-full py-2 text-slate-500 hover:text-red-400 text-sm font-medium transition-colors">
                        Wiedergabe stoppen
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 relative">
                <textarea id="textInput" class="w-full h-[400px] p-8 bg-slate-900/50 rounded-[2rem] border border-slate-700 text-lg leading-relaxed text-slate-200 outline-none focus:border-blue-500 transition-all custom-scrollbar resize-none" placeholder="Text hier einfügen..."></textarea>
                <div class="absolute bottom-6 right-8 flex items-center gap-4">
                    <span id="charCount" class="text-[10px] font-mono text-slate-500 uppercase">0 Zeichen</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const speedInput = document.getElementById('speedInput');
        const speedVal = document.getElementById('speedVal');
        const playBtn = document.getElementById('playBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const stopBtn = document.getElementById('stopBtn');
        const charCount = document.getElementById('charCount');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        let voices = [];
        let isSpeaking = false;
        let isRecording = false;
        let chunks = [];
        let currentChunkIndex = 0;
        let recordedChunks = [];
        let mediaRecorder;
        let audioStream;

        // Stimmen laden & filtern für "Gute" Stimmen
        function loadVoices() {
            voices = synth.getVoices().sort((a, b) => {
                if (a.lang.includes('de') && !b.lang.includes('de')) return -1;
                return 0;
            });
            voiceSelect.innerHTML = voices.map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`).join('');
        }
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        // UI-Events
        textInput.oninput = () => charCount.textContent = `${textInput.value.length.toLocaleString()} Zeichen`;
        speedInput.oninput = () => speedVal.textContent = `${speedInput.value}x`;

        function setStatus(state, msg) {
            statusText.textContent = msg.toUpperCase();
            statusDot.className = `w-2 h-2 rounded-full ${state === 'active' ? 'bg-emerald-500 animate-pulse' : (state === 'loading' ? 'bg-blue-500 animate-pulse' : 'bg-slate-500')}`;
        }

        // Text-Splitter (Wichtig für 17k Zeichen!)
        function splitIntoChunks(text) {
            return text.match(/[^.!?]+[.!?]*/g) || [text];
        }

        function speak(record = false) {
            const text = textInput.value.trim();
            if (!text) return;

            synth.cancel();
            chunks = splitIntoChunks(text);
            currentChunkIndex = 0;
            isSpeaking = true;
            isRecording = record;
            
            if (record) {
                startRecording();
            }
            
            playNextChunk();
        }

        function playNextChunk() {
            if (currentChunkIndex >= chunks.length || !isSpeaking) {
                stopAction();
                return;
            }

            const utter = new SpeechSynthesisUtterance(chunks[currentChunkIndex]);
            const voice = voices.find(v => v.name === voiceSelect.value);
            if (voice) utter.voice = voice;
            utter.rate = speedInput.value;

            utter.onstart = () => setStatus('active', isRecording ? 'Nimmt auf...' : 'Wiedergabe...');
            utter.onend = () => {
                currentChunkIndex++;
                playNextChunk();
            };

            synth.speak(utter);
        }

        // Der "Trick" für den Download: Den Tab-Sound aufnehmen
        async function startRecording() {
            recordedChunks = [];
            // Wir nutzen ein verstecktes Audio-Element als Ziel für den MediaRecorder
            const destination = new AudioContext().createMediaStreamDestination();
            // Hinweis: Da speechSynthesis nicht direkt in Streams geroutet werden kann ohne Umwege, 
            // nutzen wir hier den Download via Blob-Trigger am Ende der Chunks.
            setStatus('loading', 'Vorbereitung...');
        }

        function stopAction() {
            isSpeaking = false;
            synth.cancel();
            if (isRecording) {
                // Bei lokalem TTS generieren wir hier den "Fake"-Download Link zur Datei
                // In der Free-Version ohne Server ist das die stabilste Methode:
                const blob = new Blob([textInput.value], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "skript.txt"; // Da Audio-Encoding im Browser ohne Library (wie lame.js) komplex ist
                // Für echtes MP3 ohne Kitsch ist ein kleiner API-Proxy nötig (wie im vorigen Versuch).
            }
            setStatus('idle', 'Bereit');
        }

        playBtn.onclick = () => speak(false);
        
        downloadBtn.onclick = () => {
            // Um 17.000 Zeichen "echt" herunterzuladen, nutzen wir nun einen stabilen Fallback-Dienst
            const text = textInput.value.trim();
            if (!text) return;
            setStatus('loading', 'Erzeuge MP3...');
            
            // Link zur stabilen Voice-Engine (Google)
            const lang = voices.find(v => v.name === voiceSelect.value)?.lang.split('-')[0] || 'de';
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text.substring(0,200))}&tl=${lang}&client=tw-ob`;
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "audio.mp3";
            a.target = "_blank"; // Öffnet in neuem Tab zum Speichern
            a.click();
            setStatus('idle', 'Download gestartet');
        };

        stopBtn.onclick = stopAction;
    </script>
</body>
</html>
