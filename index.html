<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Studio - Unlimited Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
        }

        .studio-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .shimmer {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-5xl studio-card rounded-[2.5rem] p-6 md:p-12 shadow-2xl">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                    Voice Studio <span class="text-white opacity-20">|</span> DL
                </h1>
                <p class="text-slate-400 text-sm mt-1">Realistische Stimmen & MP3 Export</p>
            </div>
            <div id="status" class="px-4 py-2 rounded-full bg-slate-800 border border-slate-700 text-xs font-mono flex items-center gap-2">
                <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                <span id="statusText">BEREIT</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-6">
                <div class="p-6 bg-slate-800/50 rounded-3xl border border-white/5">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-4">Sprach-Profil</label>
                    <select id="langSelect" class="w-full bg-slate-900 text-white p-3 rounded-xl border border-slate-700 outline-none focus:ring-2 focus:ring-blue-500 mb-4">
                        <option value="de">Deutsch (Standard)</option>
                        <option value="en">English (US)</option>
                        <option value="fr">Français</option>
                        <option value="it">Italiano</option>
                        <option value="es">Español</option>
                    </select>
                    
                    <div class="space-y-4">
                        <div class="flex justify-between text-xs font-semibold">
                            <span class="text-slate-400 uppercase">Geschwindigkeit</span>
                            <span id="speedVal" class="text-blue-400">1.0x</span>
                        </div>
                        <input type="range" id="speedInput" min="0.5" max="2" value="1" step="0.1" 
                            class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button id="previewBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl transition-all flex items-center justify-center gap-3 shadow-lg shadow-blue-900/20 active:scale-95">
                        <i class="fas fa-play"></i> Vorschau
                    </button>
                    <button id="downloadBtn" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-2xl transition-all flex items-center justify-center gap-3 shadow-lg shadow-emerald-900/20 active:scale-95">
                        <i class="fas fa-file-download"></i> MP3 Herunterladen
                    </button>
                    <button id="stopBtn" class="w-full py-2 text-slate-500 hover:text-red-400 text-sm font-medium transition-colors">
                        Wiedergabe stoppen
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 relative">
                <textarea id="textInput" 
                    class="w-full h-[400px] p-8 bg-slate-900/50 rounded-[2rem] border border-slate-700 text-lg leading-relaxed text-slate-200 outline-none focus:border-blue-500 transition-all custom-scrollbar resize-none"
                    placeholder="Dein Text hier..."></textarea>
                <div class="absolute bottom-6 right-8 flex items-center gap-4">
                    <span id="charCount" class="text-[10px] font-mono text-slate-500 uppercase">0 Zeichen</span>
                </div>
            </div>
        </div>

        <div id="audioPlayerContainer" class="mt-8 opacity-0 pointer-events-none"></div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const langSelect = document.getElementById('langSelect');
        const speedInput = document.getElementById('speedInput');
        const speedVal = document.getElementById('speedVal');
        const previewBtn = document.getElementById('previewBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const stopBtn = document.getElementById('stopBtn');
        const charCount = document.getElementById('charCount');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        let currentAudio = null;

        // UI Updates
        textInput.oninput = () => charCount.textContent = `${textInput.value.length.toLocaleString()} Zeichen`;
        speedInput.oninput = () => speedVal.textContent = `${speedInput.value}x`;

        function setStatus(state, msg) {
            statusText.textContent = msg.toUpperCase();
            if (state === 'loading') {
                statusDot.className = "w-2 h-2 rounded-full bg-blue-500 animate-pulse";
            } else if (state === 'active') {
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
            } else {
                statusDot.className = "w-2 h-2 rounded-full bg-slate-500";
            }
        }

        // Hilfsfunktion: Text in mundgerechte Häppchen teilen (Google Limit umgehen)
        function splitTextIntoChunks(text, maxLength = 200) {
            const chunks = [];
            let currentChunk = "";
            const sentences = text.match(/[^\.!\?]+[\.!\?]+/g) || [text];

            sentences.forEach(sentence => {
                if ((currentChunk + sentence).length < maxLength) {
                    currentChunk += sentence;
                } else {
                    chunks.push(currentChunk.trim());
                    currentChunk = sentence;
                }
            });
            if (currentChunk) chunks.push(currentChunk.trim());
            return chunks;
        }

        // Die Hauptfunktion für Audio-Erzeugung
        async function fetchAudioBlobs(text) {
            const chunks = splitTextIntoChunks(text);
            const lang = langSelect.value;
            const speed = speedInput.value;
            const blobs = [];

            for (let i = 0; i < chunks.length; i++) {
                setStatus('loading', `Teil ${i+1}/${chunks.length} wird geladen...`);
                // Wir nutzen einen freien TTS Proxy (Google Translate Interface)
                const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(chunks[i])}&tl=${lang}&total=${chunks.length}&idx=${i}&textlen=${chunks[i].length}&client=tw-ob&ttsspeed=${speed}`;
                
                try {
                    const response = await fetch(url);
                    const blob = await response.blob();
                    blobs.push(blob);
                } catch (e) {
                    console.error("Fehler beim Abruf:", e);
                }
            }
            return blobs;
        }

        // VORSCHAU FUNKTION
        previewBtn.onclick = async () => {
            const text = textInput.value.trim();
            if (!text) return alert("Bitte Text eingeben");

            if (currentAudio) currentAudio.pause();
            
            const blobs = await fetchAudioBlobs(text);
            let currentIdx = 0;

            function playNext() {
                if (currentIdx < blobs.length) {
                    const url = URL.createObjectURL(blobs[currentIdx]);
                    currentAudio = new Audio(url);
                    currentAudio.play();
                    setStatus('active', 'WIEDERGABE...');
                    currentAudio.onended = () => {
                        currentIdx++;
                        playNext();
                    };
                } else {
                    setStatus('idle', 'BEREIT');
                }
            }
            playNext();
        };

        // DOWNLOAD FUNKTION
        downloadBtn.onclick = async () => {
            const text = textInput.value.trim();
            if (!text) return alert("Bitte Text eingeben");

            setStatus('loading', 'MP3 wird erstellt...');
            const blobs = await fetchAudioBlobs(text);
            
            // Die Blobs zu einer einzigen Datei zusammenfügen
            const mergedBlob = new Blob(blobs, { type: 'audio/mpeg' });
            const url = URL.createObjectURL(mergedBlob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `voice-studio-audio-${Date.now()}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            setStatus('idle', 'DOWNLOAD FERTIG');
        };

        stopBtn.onclick = () => {
            if (currentAudio) currentAudio.pause();
            setStatus('idle', 'GESTOPPT');
        };

    </script>
</body>
</html>
