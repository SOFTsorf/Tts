<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure System TTS Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .app-container {
            max-width: 900px;
            margin: 2rem auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        textarea {
            scrollbar-width: thin;
            scrollbar-color: #e5e7eb transparent;
        }
        .active-ring {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="app-container overflow-hidden flex flex-col min-h-[80vh]">
        <header class="p-6 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-10">
            <div>
                <h1 class="text-2xl font-semibold text-gray-800">System <span class="text-blue-600">Reader</span></h1>
                <p class="text-xs text-gray-400 font-medium uppercase tracking-widest mt-1">Unbegrenzte lokale Sprachausgabe</p>
            </div>
            <div id="statusIndicator" class="flex items-center gap-2 text-sm font-medium text-gray-500">
                <span class="w-2 h-2 rounded-full bg-gray-300" id="statusDot"></span>
                <span id="statusText">Bereit</span>
            </div>
        </header>

        <main class="flex-1 p-6 flex flex-col gap-6">
            <div class="relative flex-1 flex flex-col">
                <textarea id="textInput" 
                    class="w-full flex-1 p-6 text-lg bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none resize-none transition-all"
                    placeholder="Füge hier deinen Text ein (auch sehr lange Texte)..."></textarea>
                <div class="absolute bottom-4 right-6 text-[10px] font-mono text-gray-400 uppercase tracking-tighter">
                    <span id="charCount">0</span> Zeichen
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Stimme</label>
                    <select id="voiceSelect" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-sm outline-none focus:border-blue-500"></select>
                </div>
                
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Tempo</label>
                        <span id="speedVal" class="text-xs font-mono text-blue-600">1.0x</span>
                    </div>
                    <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <div class="flex gap-2">
                    <button id="playBtn" class="flex-1 h-12 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2 active:scale-95">
                        <i class="fas fa-play"></i> Start
                    </button>
                    <button id="stopBtn" class="w-12 h-12 bg-gray-100 hover:bg-red-100 hover:text-red-600 text-gray-500 rounded-xl transition-all flex items-center justify-center">
                        <i class="fas fa-stop"></i>
                    </button>
                </div>
            </div>
        </main>

        <footer class="p-6 bg-gray-50 border-t border-gray-100">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-xs text-gray-500 max-w-md">
                    <i class="fas fa-info-circle mr-1"></i> 
                    Da Systemstimmen direkt im Browser generiert werden, ist ein direkter "Download-Button" technisch nicht möglich. Nutze für Aufnahmen Tools wie <b>Audacity</b> oder eine Browser-Erweiterung wie <b>Audio Downloader Prime</b>.
                </div>
            </div>
        </footer>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const textInput = document.querySelector('#textInput');
        const voiceSelect = document.querySelector('#voiceSelect');
        const playBtn = document.querySelector('#playBtn');
        const stopBtn = document.querySelector('#stopBtn');
        const rateInput = document.querySelector('#rate');
        const speedVal = document.querySelector('#speedVal');
        const charCount = document.querySelector('#charCount');
        const statusText = document.querySelector('#statusText');
        const statusDot = document.querySelector('#statusDot');

        let voices = [];
        let isSpeaking = false;
        let currentChunkIndex = 0;
        let chunks = [];

        // Stimmen laden
        function loadVoices() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = '';
            
            // Bevorzuge Deutsch
            const deVoices = voices.filter(v => v.lang.includes('de'));
            const otherVoices = voices.filter(v => !v.lang.includes('de'));
            
            [...deVoices, ...otherVoices].forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                voiceSelect.appendChild(option);
            });
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
        loadVoices();

        // Text-Chunking Funktion (Das Geheimnis für lange Texte)
        function splitIntoChunks(text) {
            // Teilt den Text an Satzenden (. ! ?), um flüssig zu lesen
            return text.match(/[^\.!\?]+[\.!\?]+/g) || [text];
        }

        function updateStatus(state) {
            if (state === 'active') {
                statusDot.className = "w-2 h-2 rounded-full bg-green-500 animate-pulse";
                statusText.textContent = "Liest...";
                playBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
            } else if (state === 'paused') {
                statusDot.className = "w-2 h-2 rounded-full bg-yellow-500";
                statusText.textContent = "Pausiert";
                playBtn.innerHTML = '<i class="fas fa-play"></i> Weiter';
            } else {
                statusDot.className = "w-2 h-2 rounded-full bg-gray-300";
                statusText.textContent = "Bereit";
                playBtn.innerHTML = '<i class="fas fa-play"></i> Start';
            }
        }

        function speakNextChunk() {
            if (currentChunkIndex >= chunks.length) {
                isSpeaking = false;
                updateStatus('idle');
                return;
            }

            const utter = new SpeechSynthesisUtterance(chunks[currentChunkIndex]);
            const selectedVoice = voices.find(v => v.name === voiceSelect.value);
            if (selectedVoice) utter.voice = selectedVoice;
            
            utter.rate = rateInput.value;
            
            utter.onend = () => {
                if (isSpeaking) {
                    currentChunkIndex++;
                    speakNextChunk();
                }
            };

            utter.onerror = (e) => {
                console.error("Fehler bei Sprachausgabe", e);
                updateStatus('idle');
            };

            synth.speak(utter);
        }

        playBtn.onclick = () => {
            if (synth.speaking && !synth.paused) {
                synth.pause();
                updateStatus('paused');
                return;
            }
            
            if (synth.paused) {
                synth.resume();
                updateStatus('active');
                return;
            }

            const text = textInput.value.trim();
            if (text) {
                chunks = splitIntoChunks(text);
                currentChunkIndex = 0;
                isSpeaking = true;
                updateStatus('active');
                speakNextChunk();
            }
        };

        stopBtn.onclick = () => {
            isSpeaking = false;
            synth.cancel();
            updateStatus('idle');
        };

        rateInput.oninput = () => speedVal.textContent = rateInput.value + 'x';
        textInput.oninput = () => charCount.textContent = textInput.value.length.toLocaleString();

    </script>
</body>
</html>
