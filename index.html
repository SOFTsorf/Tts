<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Reader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        textarea {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .custom-loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-4xl glass-card rounded-[2rem] p-8 md:p-12 transition-all">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                Neural Voice Reader
            </h1>
            <p class="text-gray-400 font-light text-lg">Realistische KI-Stimmen ohne Limits</p>
        </div>

        <div class="space-y-6">
            <div class="relative">
                <textarea id="textInput" rows="8" 
                    class="w-full p-6 text-white text-lg rounded-2xl outline-none resize-none"
                    placeholder="Deinen Text hier einfügen..."></textarea>
                <div id="charCount" class="absolute bottom-4 right-4 text-xs text-gray-500 font-mono">0 Zeichen</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col space-y-2">
                    <label class="text-sm font-semibold text-gray-400 ml-1">KI-Stimme wählen</label>
                    <select id="voiceSelect" class="bg-slate-800 border border-slate-700 text-white p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 appearance-none">
                        <optgroup label="Deutsch (Neural)">
                            <option value="de-DE-KatjaNeural">Katja (Weiblich)</option>
                            <option value="de-DE-ConradNeural">Conrad (Männlich)</option>
                            <option value="de-DE-KillianNeural">Killian (Männlich)</option>
                            <option value="de-DE-AmalaNeural">Amala (Weiblich)</option>
                        </optgroup>
                        <optgroup label="Englisch (Neural)">
                            <option value="en-US-AriaNeural">Aria (Female)</option>
                            <option value="en-US-GuyNeural">Guy (Male)</option>
                            <option value="en-GB-SoniaNeural">Sonia (Female)</option>
                        </optgroup>
                    </select>
                </div>

                <div class="flex flex-col space-y-2">
                    <label class="text-sm font-semibold text-gray-400 ml-1">Optionen</label>
                    <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl flex items-center justify-between">
                        <span class="text-sm">Download bereitstellen?</span>
                        <input type="checkbox" id="autoDownload" checked class="w-5 h-5 accent-blue-500">
                    </div>
                </div>
            </div>

            <div class="flex flex-col items-center gap-6 mt-4">
                <button id="generateBtn" 
                    class="group relative w-full md:w-auto px-12 py-4 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold rounded-full transition-all shadow-xl hover:shadow-blue-500/25 flex items-center justify-center gap-3 active:scale-95">
                    <span id="btnText">Audio generieren</span>
                    <div id="loader" class="custom-loader"></div>
                    <i class="fas fa-magic group-hover:rotate-12 transition-transform"></i>
                </button>

                <div id="playerContainer" class="w-full hidden space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <audio id="audioPlayer" controls class="w-full h-12 rounded-lg"></audio>
                    <a id="downloadLink" href="#" download="ki-audio.mp3" 
                        class="flex items-center justify-center gap-2 text-emerald-400 hover:text-emerald-300 font-semibold text-sm transition-colors">
                        <i class="fas fa-download"></i> MP3 herunterladen
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-10 text-gray-600 text-xs">
        Angetrieben durch Microsoft Neural TTS &bull; Keine Speicherung von Daten
    </footer>

    <script>
        const generateBtn = document.querySelector('#generateBtn');
        const btnText = document.querySelector('#btnText');
        const loader = document.querySelector('#loader');
        const textInput = document.querySelector('#textInput');
        const voiceSelect = document.querySelector('#voiceSelect');
        const playerContainer = document.querySelector('#playerContainer');
        const audioPlayer = document.querySelector('#audioPlayer');
        const downloadLink = document.querySelector('#downloadLink');
        const charCount = document.querySelector('#charCount');

        // Update Zeichenzähler
        textInput.addEventListener('input', () => {
            charCount.textContent = `${textInput.value.length} Zeichen`;
        });

        async function generateAudio() {
            const text = textInput.value.trim();
            const voice = voiceSelect.value;

            if (!text) {
                alert("Bitte gib einen Text ein!");
                return;
            }

            // UI Status: Laden
            generateBtn.disabled = true;
            btnText.textContent = "Verarbeite...";
            loader.style.display = "block";
            playerContainer.classList.add('hidden');

            try {
                // Wir nutzen einen freien TTS-Proxy für Microsoft Edge Neural Voices
                // Diese API wandelt den Text in echtes Audio um (Neural)
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://manage.getliner.com/api/v1/tts/edge?text=${encodeURIComponent(text)}&speaker=${voice}&speed=1`)}`);
                
                const data = await response.json();
                const jsonData = JSON.parse(data.contents);

                if (jsonData.audio_url || jsonData.url) {
                    const finalUrl = jsonData.audio_url || jsonData.url;
                    
                    // Audio in Player laden
                    audioPlayer.src = finalUrl;
                    downloadLink.href = finalUrl;
                    
                    playerContainer.classList.remove('hidden');
                    btnText.textContent = "Neu generieren";
                } else {
                    throw new Error("Audio konnte nicht generiert werden.");
                }

            } catch (error) {
                console.error(error);
                alert("Fehler: Die KI-Schnittstelle antwortet nicht. Bitte versuche es später noch einmal.");
                btnText.textContent = "Audio generieren";
            } finally {
                generateBtn.disabled = false;
                loader.style.display = "none";
            }
        }

        generateBtn.onclick = generateAudio;
    </script>
</body>
</html>
